<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PHASE-0</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="hud top">
      <div class="boss-wrap">
        <div class="boss-bar"><div id="bossFill" class="boss-fill"></div></div>
        <div id="phaseText" class="phase-text">PHASE 1</div>
      </div>
    </header>

    <main class="game-shell">
      <canvas id="gameCanvas" width="420" height="740"></canvas>

      <div id="scoreCorner" class="corner-score">000000</div>

      <div id="overlay" class="overlay visible">
        <div class="panel">
          <div class="panel-kicker">LOCAL BUILD</div>
          <h2>PHASE-0</h2>
          <p>
            单体压制试验。<br />
            拖动操控机体，松手低速观测。
          </p>
          <div class="control-list">
            <div>DRAG / MOVE</div>
            <div>RELEASE / LOW-SPEED</div>
            <div>POINT HITBOX / GRAZE / 5 PETAL LIFE</div>
          </div>
          <button id="startBtn" class="btn">开始</button>
        </div>
      </div>

      <div id="resultOverlay" class="overlay hidden">
        <div class="panel">
          <div id="resultKicker" class="panel-kicker">模拟结果</div>
          <h2 id="resultTitle">目标排除</h2>
          <div id="resultStats"></div>
          <button id="restartBtn" class="btn">重新部署</button>
        </div>
      </div>
    </main>
  </div>

  <script src="game.js"></script>
</body>
</html>
